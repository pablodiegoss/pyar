 {% load static %}
<html>
<head>
    <title>Home</title>

</head>
<body>
    <div id="video-container">
          <video id="front-camera" autoplay="" playsinline="" muted=""></video>
    </div>
    <canvas id="output-canvas"></canvas>
    <p id="status">Waiting for OpenCV...</p>
    <script>
        const videoEl = document.getElementById('front-camera');
        const canvasEl = document.getElementById('output-canvas');
        const statusEl = document.getElementById('status');
        const ctx = canvasEl.getContext('2d');

        let mediaStream = null;
        let animationId = null;
        let started = false;

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function waitForVideoMetadata(video) {
            if (video.readyState >= 1 && video.videoWidth > 0 && video.videoHeight > 0) {
                return Promise.resolve();
            }

            return new Promise((resolve) => {
                video.addEventListener('loadedmetadata', () => resolve(), { once: true });
            });
        }

        async function startCamera() {
            try {
                // Request webcam stream and attach it to the input video element.
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                videoEl.srcObject = mediaStream;
                await videoEl.play();
                await waitForVideoMetadata(videoEl);
            } catch (error) {
                setStatus('Camera access failed. Please allow webcam permissions.');
                throw error;
            }
        }

        function processFrame() {
            if (!window.cv || videoEl.videoWidth === 0 || videoEl.videoHeight === 0) {
                animationId = requestAnimationFrame(processFrame);
                return;
            }

            ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);

            const frame = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
            const src = cv.matFromImageData(frame);
            const dst = new cv.Mat();
            
            // Convert image to grayscale and apply a threshold
            cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
            cv.threshold(dst, dst, 127, 255, cv.THRESH_BINARY | cv.THRESH_OTSU);
            
            let contours = new cv.MatVector();
            let hierarchies = new cv.Mat();
            cv.findContours(dst, contours, hierarchies, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

            // Draw contours on the original image
            // Convert back to RGBA for display
            cv.cvtColor(dst, dst, cv.COLOR_GRAY2RGBA);
            probable_markers = {};
            for (let i = 0; i < contours.size(); ++i) {
                // Draw all contours
                const color = new cv.Scalar(100, 200, 255, 255);
                cv.drawContours(dst, contours, i, color, 2, cv.LINE_8, hierarchies, 100);

                min_area = 100;
                epsilon = 0.03 * cv.arcLength(contours.get(i), true);
                const approx = new cv.Mat();
                cv.approxPolyDP(contours.get(i), approx, epsilon, true);

                if (approx.rows === 4 && cv.contourArea(approx) > min_area && cv.isContourConvex(approx)) {
                    // Draw the approximated contour in green
                    const approxColor = new cv.Scalar(0, 255, 0, 255);
                    let contour = new cv.MatVector();
                    contour.push_back(approx);
                    cv.drawContours(dst, contour, -1, approxColor, 2, cv.LINE_8);
                    contour.delete();
                    // Store the approximated contour as a probable marker
                    probable_markers[i] = approx;
                    // Verify if the contour has a parent (i.e., it's nested inside another contour)
                    // Hierarchies are stored in the format [ ID Next contour, ID of Previous Contour, ID of First Child contour, ID of Parent contour ]
                    let contour_parent = hierarchies.intPtr(0, i)[3]
                    if (contour_parent in probable_markers) {
                        // remove the parent contour from probable markers if it has a child contour that is also a probable marker
                        delete probable_markers[contour_parent];
                    }
                }
            }

            for (marker in probable_markers) {
                const approxColor = new cv.Scalar(255, 0, 0, 255);
                let contour = new cv.MatVector();
                contour.push_back(probable_markers[marker]);
                cv.drawContours(dst, contour, -1, approxColor, 2, cv.LINE_8);
                contour.delete();
            }

            frame.data.set(dst.data);
            ctx.putImageData(frame, 0, 0);

            src.delete();
            dst.delete();
            for (marker in probable_markers) {
                probable_markers[marker].delete();
            }
            probable_markers = {};
            contours.delete();
            hierarchies.delete();

            animationId = requestAnimationFrame(processFrame);
        }

        async function initializePipeline() {
            if (started) {
                return;
            }

            started = true;
            setStatus('Starting camera...');

            await startCamera();

            canvasEl.width = videoEl.videoWidth;
            canvasEl.height = videoEl.videoHeight;

            setStatus('Processing video with OpenCV.js');
            animationId = requestAnimationFrame(processFrame);
        }

        function onOpenCvReady() {
            if (!window.cv) {
                setStatus('OpenCV failed to load.');
                return;
            }

            if (typeof cv.getBuildInformation === 'function') {
                initializePipeline().catch((error) => {
                    console.error(error);
                });
                return;
            }

            cv.onRuntimeInitialized = () => {
                initializePipeline().catch((error) => {
                    console.error(error);
                });
            };
        }
    </script>
    <script async src="{% static 'opencv-4.13.0.js' %}" onload="onOpenCvReady();" type="text/javascript"></script>
</body>
</html>
