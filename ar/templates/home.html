 {% load static %}
<html>
<head>
    <title>Home</title>
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body>
    <div id="main-view">
      <div id="video-container">
          <video id="front-camera" autoplay="" playsinline="" muted=""></video>
      </div>
      <canvas id="output-canvas"></canvas>
    </div>
    <p id="status">Waiting for OpenCV...</p>
    <div id="controls-panel">
        <h3>Runtime Tuning</h3>
        <div id="controls-grid">
            <div class="control-item"><label for="ctrl-warp-size">Warp Size</label><input id="ctrl-warp-size" type="range" min="64" max="256" step="8"><span id="val-warp-size" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-border-size">Border Size</label><input id="ctrl-border-size" type="range" min="4" max="64" step="1"><span id="val-border-size" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-interior-size">Interior Size</label><input id="ctrl-interior-size" type="range" min="16" max="192" step="1"><span id="val-interior-size" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-epsilon-coeff">Epsilon Coeff</label><input id="ctrl-epsilon-coeff" type="range" min="0.01" max="0.05" step="0.005"><span id="val-epsilon-coeff" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-min-area">Min Area</label><input id="ctrl-min-area" type="range" min="200" max="2000" step="50"><span id="val-min-area" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-max-side-ratio">Max Side Ratio</label><input id="ctrl-max-side-ratio" type="range" min="1.0" max="10.0" step="0.1"><span id="val-max-side-ratio" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-black-border-threshold">Black Border Threshold</label><input id="ctrl-black-border-threshold" type="range" min="0.5" max="0.95" step="0.05"><span id="val-black-border-threshold" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-binary-threshold">Binary Threshold</label><input id="ctrl-binary-threshold" type="range" min="0" max="255" step="1"><span id="val-binary-threshold" class="control-value"></span></div>
            <div class="control-item checkbox"><label for="ctrl-use-otsu">Use Otsu</label><input id="ctrl-use-otsu" type="checkbox"></div>
            <div class="control-item"><label for="ctrl-temporal-confirm-frames">Temporal Confirm Frames</label><input id="ctrl-temporal-confirm-frames" type="range" min="1" max="8" step="1"><span id="val-temporal-confirm-frames" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-track-stale-frames">Track Stale Frames</label><input id="ctrl-track-stale-frames" type="range" min="2" max="12" step="1"><span id="val-track-stale-frames" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-centroid-grid">Centroid Grid</label><input id="ctrl-centroid-grid" type="range" min="4" max="32" step="1"><span id="val-centroid-grid" class="control-value"></span></div>
            <div class="control-item"><label for="ctrl-process-every-n-frames">Process Every N Frames</label><input id="ctrl-process-every-n-frames" type="range" min="1" max="4" step="1"><span id="val-process-every-n-frames" class="control-value"></span></div>
        </div>
    </div>
    <canvas id="debug-canvas" style="border: 1px solid #ccc; margin-top: 10px; display: none;"></canvas>
    <script src="{% static 'ar-detection-utils.js' %}"></script>
    <script src="{% static 'debug-ui.js' %}"></script>
    <script>
        const videoEl = document.getElementById('front-camera');
        const canvasEl = document.getElementById('output-canvas');
        const debugCanvasEl = document.getElementById('debug-canvas');
        const debugCtx = debugCanvasEl.getContext('2d');
        const statusEl = document.getElementById('status');
        const ctx = canvasEl.getContext('2d');
        
        const DEFAULTS = {
            warpSize: 128,
            borderSize: 26,
            interiorSize: 76,
            temporalConfirmFrames: 4,
            trackStaleFrames: 6,
            centroidGrid: 22,
            minArea: 500,
            epsilonCoeff: 0.025,
            blackBorderThreshold: 0.65,
            processEveryNFrames: 1,
            binaryThreshold: 160,
            useOtsu: true,
            maxSideRatio: 2.0,
            edgeMarginPx: 10
        };

        const config = { ...DEFAULTS };

        const DEBUG_MODE = true;
        const DEBUG_GRID_SIZE = 6;
        const DEBUG_DISPLAY_SIZE = 128;

        let mediaStream = null;
        let animationId = null;
        let started = false;
        let frameNumber = 0;

        const tracks = new Map();
        const debugWarps = [];

    
        function setStatus(text) {
            statusEl.textContent = text;
        }

        function warpAndCheckMarker(approx, grayBinary, originalSrc) {
            const ordered = orderPoints(approx);
            const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
                ordered[0].x, ordered[0].y,
                ordered[1].x, ordered[1].y,
                ordered[2].x, ordered[2].y,
                ordered[3].x, ordered[3].y,
            ]);
            const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
                0,                 0,
                config.warpSize-1, 0,
                config.warpSize-1, config.warpSize-1,
                0,                 config.warpSize-1,
            ]);

            const M = cv.getPerspectiveTransform(srcPts, dstPts);
            const warped = new cv.Mat();
            cv.warpPerspective(grayBinary, warped, M, new cv.Size(config.warpSize, config.warpSize));

            const fullMean = cv.mean(warped)[0];
            const innerRect = new cv.Rect(config.borderSize, config.borderSize, config.interiorSize, config.interiorSize);
            const innerRoi = warped.roi(innerRect);
            const innerMean = cv.mean(innerRoi)[0];

            const borderArea = config.warpSize * config.warpSize - config.interiorSize * config.interiorSize;
            const borderSum = fullMean * config.warpSize * config.warpSize - innerMean * config.interiorSize * config.interiorSize;
            const borderBlackRatio = 1 - (borderSum / borderArea) / 255;

            let interior = null;
            if (borderBlackRatio >= config.blackBorderThreshold) {
                if (DEBUG_MODE && originalSrc) {
                    const colorWarped = new cv.Mat();
                    cv.warpPerspective(originalSrc, colorWarped, M, new cv.Size(config.warpSize, config.warpSize));
                    addDebugWarp(colorWarped);
                    colorWarped.delete();
                }
                interior = innerRoi.clone();
            }

            srcPts.delete();
            dstPts.delete();
            M.delete();
            innerRoi.delete();
            warped.delete();

            return interior;
        }

        function updateTrack(key, approx) {
            const prev = tracks.get(key);
            if (!prev) {
                tracks.set(key, {
                    consecutive: 1,
                    lastSeen: frameNumber,
                    approx: approx.clone(),
                });
                return;
            }

            prev.consecutive = prev.lastSeen === frameNumber - 1 ? prev.consecutive + 1 : 1;
            prev.lastSeen = frameNumber;
            prev.approx.delete();
            prev.approx = approx.clone();
        }

        function pruneStaleTracks() {
            for (const [key, track] of tracks.entries()) {
                if (frameNumber - track.lastSeen > config.trackStaleFrames) {
                    track.approx.delete();
                    tracks.delete(key);
                }
            }
        }

        function processFrame() {
            if (!window.cv || videoEl.videoWidth === 0 || videoEl.videoHeight === 0) {
                animationId = requestAnimationFrame(processFrame);
                return;
            }

            frameNumber += 1;
            if (frameNumber % config.processEveryNFrames !== 0) {
                animationId = requestAnimationFrame(processFrame);
                return;
            }

            ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);

            const frame = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
            const src = cv.matFromImageData(frame);
            const gray = new cv.Mat();
            const dst = new cv.Mat();

            debugWarps.length = 0;

            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            const thresholdType = config.useOtsu ? (cv.THRESH_BINARY | cv.THRESH_OTSU) : cv.THRESH_BINARY;
            cv.threshold(gray, gray, config.binaryThreshold, 255, thresholdType);

            const contours = new cv.MatVector();
            const hierarchies = new cv.Mat();
            cv.findContours(gray, contours, hierarchies, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);
            cv.cvtColor(gray, dst, cv.COLOR_GRAY2RGBA);

            const probableMarkers = {};

            for (let i = 0; i < contours.size(); ++i) {
                const contour = contours.get(i);

                const epsilon = config.epsilonCoeff * cv.arcLength(contour, true);
                const approx = new cv.Mat();
                cv.approxPolyDP(contour, approx, epsilon, true);
                contour.delete();
                

                const rect = cv.boundingRect(approx);
                const touchesBorder =
                    rect.x <= config.edgeMarginPx ||
                    rect.y <= config.edgeMarginPx ||
                    rect.x + rect.width >= canvasEl.width - config.edgeMarginPx ||
                    rect.y + rect.height >= canvasEl.height - config.edgeMarginPx;

                if (approx.rows === 4 && cv.contourArea(approx) > config.minArea && cv.isContourConvex(approx) && getSideRatio(approx) <= config.maxSideRatio && !touchesBorder) {
                    
                    
                    const parent = hierarchies.intPtr(0, i)[3];
                    if (parent in probableMarkers) {
                        // probableMarkers[parent].delete();
                        // delete probableMarkers[parent];
                    }else{
                        probableMarkers[i] = approx;
                        
                    }
                } else {
                    approx.delete();
                }
            }

            for (const id in probableMarkers) {
                const approx = probableMarkers[id];

                // draw contours for debugging
                const debugColor = new cv.Scalar(0, 255, 0, 255);
                const contourVec = new cv.MatVector();
                contourVec.push_back(approx);
                cv.drawContours(dst, contourVec, -1, debugColor, 2, cv.LINE_8);
                contourVec.delete();

                const interior = warpAndCheckMarker(approx, gray, src);

                if (interior !== null) {
                    const key = centroidKey(approx);
                    updateTrack(key, approx);
                    interior.delete();
                }

                approx.delete();
            }

            pruneStaleTracks();

            let confirmedCount = 0;
            for (const track of tracks.values()) {
                if (track.consecutive >= config.temporalConfirmFrames) {
                    confirmedCount += 1;
                    const confirmedColor = new cv.Scalar(255, 0, 0, 255);
                    const contourVec = new cv.MatVector();
                    contourVec.push_back(track.approx);
                    cv.drawContours(dst, contourVec, -1, confirmedColor, 3, cv.LINE_8);
                    contourVec.delete();
                }
            }

            if (confirmedCount > 0) {
                setStatus(`Markers confirmed: ${confirmedCount}`);
            } else {
                setStatus('Processing video with OpenCV.js');
            }

            if (DEBUG_MODE) {
                drawDebugGrid();
            }

            frame.data.set(dst.data);
            ctx.putImageData(frame, 0, 0);

            src.delete();
            gray.delete();
            dst.delete();
            contours.delete();
            hierarchies.delete();

            animationId = requestAnimationFrame(processFrame);
        }

        bindControls();
        syncControls();
    </script>
    <script async src="{% static 'opencv-4.13.0.js' %}" onload="onOpenCvReady();" type="text/javascript"></script>
</body>
</html>
